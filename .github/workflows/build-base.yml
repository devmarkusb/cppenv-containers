name: Build, Smoke Test & Push Toolchain Images (GHCR)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/toolchain

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # clang 18.1.8 with libc++ for x86+arm (smoke test only arm64)
          - variant: clang-libcxx
            image_tag: clang-18.1.8-libcxx
            platforms_push: linux/amd64,linux/arm64
            platform_test: linux/arm64
            compiler_type: clang
            compiler_xpack: 18.1.8-1
            use_libcxx: "1"
            smoke_mode: libcxx

          # clang 18.1.8 without libc++ for x86
          - variant: clang
            image_tag: clang-18.1.8
            platforms_push: linux/amd64
            platform_test: linux/amd64
            compiler_type: clang
            compiler_xpack: 18.1.8-1
            use_libcxx: "0"
            smoke_mode: default

          # gcc 14.3.0 for x86
          - variant: gcc
            image_tag: gcc-14.3.0
            platforms_push: linux/amd64
            platform_test: linux/amd64
            compiler_type: gcc
            compiler_xpack: 14.3.0-1
            use_libcxx: "0"
            smoke_mode: default

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1) Build a single-platform image for smoke testing and load it locally
      - name: Build for smoke test and load
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          platforms: ${{ matrix.platform_test }}
          load: true
          tags: local/smoke:${{ matrix.image_tag }}-${{ matrix.variant }}
          build-args: |
            COMPILER_TYPE=${{ matrix.compiler_type }}
            COMPILER_VERSION=${{ matrix.compiler_xpack }}
            USE_LIBCXX=${{ matrix.use_libcxx }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) Smoke test
      - name: Smoke test
        run: |
          set -euxo pipefail
          img="local/smoke:${{ matrix.image_tag }}-${{ matrix.variant }}"
          plat="${{ matrix.platform_test }}"

          if [[ "${{ matrix.smoke_mode }}" == "libcxx" ]]; then
            docker run --rm --platform="${plat}" "${img}" bash -lc '
              set -euxo pipefail
              cc --version
              c++ --version
              cmake --version
              ninja --version

              cat >/tmp/main.cpp <<EOF
              #include <iostream>
              int main(){ std::cout << "ok\n"; }
              EOF

              c++ -std=c++20 -O2 -stdlib=libc++ -rtlib=compiler-rt -lunwind /tmp/main.cpp -o /tmp/a.out

              mkdir -p /tmp/smoke && cd /tmp/smoke
              cat >CMakeLists.txt <<EOF
              cmake_minimum_required(VERSION 3.20)
              project(smoke LANGUAGES CXX)
              add_executable(smoke main.cpp)
              target_compile_features(smoke PRIVATE cxx_std_20)
              target_compile_options(smoke PRIVATE -stdlib=libc++)
              target_link_options(smoke PRIVATE -stdlib=libc++ -rtlib=compiler-rt -lunwind)
              EOF
              cp /tmp/main.cpp main.cpp
              cmake -S . -B build -G Ninja
              cmake --build build -v
            '
          else
            docker run --rm --platform="${plat}" "${img}" bash -lc '
              set -euxo pipefail
              cc --version
              c++ --version
              cmake --version
              ninja --version

              cat >/tmp/main.cpp <<EOF
              #include <iostream>
              int main(){ std::cout << "ok\n"; }
              EOF
              c++ -std=c++20 -O2 /tmp/main.cpp -o /tmp/a.out

              mkdir -p /tmp/smoke && cd /tmp/smoke
              cat >CMakeLists.txt <<EOF
              cmake_minimum_required(VERSION 3.20)
              project(smoke LANGUAGES CXX)
              add_executable(smoke main.cpp)
              target_compile_features(smoke PRIVATE cxx_std_20)
              EOF
              cp /tmp/main.cpp main.cpp
              cmake -S . -B build -G Ninja
              cmake --build build -v
            '
          fi

      # 3) Tags for push
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.image_tag }}
            type=sha,format=short,prefix=${{ matrix.image_tag }}-

      # 4) Push (after smoke test)
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base
          platforms: ${{ matrix.platforms_push }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMPILER_TYPE=${{ matrix.compiler_type }}
            COMPILER_VERSION=${{ matrix.compiler_xpack }}
            USE_LIBCXX=${{ matrix.use_libcxx }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
